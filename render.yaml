services:
  # Backend API Web Service
  - type: web
    name: pollution-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free # To attach the persistent disk below, change this to 'starter' in Render Dashboard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pollution-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: "*" # Replace with your actual frontend URL (e.g. https://pollution-frontend.onrender.com) for secure production access
      - key: SETTINGS_API_KEY
        generateValue: true
      - key: DATA_DIR
        value: /app/storage/data
      - key: ARTIFACTS_DIR
        value: /app/storage/artifacts
    # Note: Persistent disks require a paid plan (Starter tier, $7/month).
    # If deploying on the Free tier, Render will ignore this disk block.
    disk:
      name: storage
      mountPath: /app/storage
      sizeGB: 1

  # Frontend Static Site
  - type: static
    name: pollution-frontend
    buildCommand: npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: pollution-backend
          property: host

databases:
  - name: pollution-db
    plan: free # Render PostgreSQL Free Tier (expires in 90 days)
    databaseName: pollution_db
    user: postgres
