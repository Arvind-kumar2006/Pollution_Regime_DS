services:
  db:
    image: postgres:15-alpine
    container_name: pollution-db
    environment:
      POSTGRES_DB: pollution_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pollution_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pollution-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/pollution_db
      APP_ENV: development
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      UPLOAD_MAX_MB: "50"
      SQL_ECHO: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts

volumes:
  pg_data:
